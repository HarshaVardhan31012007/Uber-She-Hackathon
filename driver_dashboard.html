<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Driver Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#000;--bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--s3:#222;
  --border:#1e1e1e;--border2:#2a2a2a;
  --uber:#06C167;--uber2:#04a355;
  --green:#06C167;
  --warn:#F4A261;--danger:#E63946;--blue:#74b9ff;
  --text:#f0f0f0;--text2:#888;--muted:#555;
  --mono:'SF Mono','Fira Code',monospace;
}
html,body{background:var(--black);color:var(--text);font-family:'Inter',sans-serif;
  max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;}

/* SPLASH */
.splash{position:fixed;inset:0;background:#000;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease;}
.splash.gone{opacity:0;pointer-events:none;}
.sp-logo{font-size:44px;font-weight:900;color:var(--text);letter-spacing:-2px;margin-bottom:6px;}
.sp-logo em{color:var(--uber);font-style:normal;}
.sp-sub{font-family:var(--mono);font-size:10px;color:var(--muted);
  letter-spacing:3px;text-transform:uppercase;}
.sp-bar{width:100px;height:2px;background:#1a1a1a;border-radius:1px;margin-top:28px;overflow:hidden;}
.sp-fill{height:100%;background:var(--uber);animation:spfill 1.4s ease forwards;}
@keyframes spfill{from{width:0}to{width:100%}}

/* LOADING */
.loading{min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;}
.ldots{display:flex;gap:8px;}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--uber);
  animation:ldot .9s infinite;}
.ldot:nth-child(2){animation-delay:.18s;}
.ldot:nth-child(3){animation-delay:.36s;}
@keyframes ldot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}}
.ltxt{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1.5px;}

/* LOGIN */
.login{min-height:100vh;display:flex;flex-direction:column;}
.login-hero{padding:56px 24px 36px;text-align:center;
  background:linear-gradient(160deg,#000 35%,#071510);
  border-bottom:1px solid #06C16718;}
.lh-logo{font-size:34px;font-weight:900;color:var(--uber);letter-spacing:-1px;margin-bottom:6px;}
.lh-logo em{color:#fff;font-style:normal;}
.lh-tag{font-size:12px;color:var(--muted);}
.login-body{flex:1;padding:24px 18px 20px;}
.lb-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.lb-search{width:100%;background:var(--s1);border:1px solid var(--border2);
  color:var(--text);padding:13px 15px;font-size:14px;font-family:'Inter',sans-serif;
  border-radius:12px;outline:none;margin-bottom:14px;transition:border-color .2s;}
.lb-search:focus{border-color:var(--uber);}
.lb-search::placeholder{color:var(--muted);}
.drv-list{display:flex;flex-direction:column;gap:8px;max-height:370px;
  overflow-y:auto;padding-right:2px;}
.drv-list::-webkit-scrollbar{width:3px;}
.drv-list::-webkit-scrollbar-thumb{background:var(--s3);}
.dl-item{display:flex;align-items:center;gap:12px;background:var(--s1);
  border:1px solid var(--border);border-radius:14px;padding:13px 14px;
  cursor:pointer;transition:all .18s;}
.dl-item:hover{border-color:#06C16740;background:#0a1510;}
.dl-item.sel{border-color:var(--uber);background:#071510;
  box-shadow:0 0 0 1px #06C16725;}
.dl-av{width:40px;height:40px;border-radius:50%;background:var(--uber);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:16px;color:#000;flex-shrink:0;}
.dl-info{flex:1;min-width:0;}
.dl-name{font-weight:700;font-size:13px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dl-meta{font-size:11px;color:var(--muted);}
.dl-right{text-align:right;flex-shrink:0;}
.dl-gs{font-family:var(--mono);font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px;}
.gs-a{background:#06C16715;color:var(--uber);}
.gs-r{background:#E6394615;color:var(--danger);}
.gs-t{background:#F4A26115;color:var(--warn);}
.dl-trips{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;}
.login-btn{width:100%;background:var(--uber);color:#000;font-weight:800;
  font-size:15px;padding:16px;border-radius:14px;border:none;cursor:pointer;
  margin-top:16px;font-family:'Inter',sans-serif;transition:background .15s;}
.login-btn:hover{background:var(--uber2);}
.login-btn:disabled{background:var(--s2);color:var(--muted);cursor:not-allowed;}
.login-form{background:var(--s1);border:1px solid var(--border);
  border-radius:20px;padding:24px;margin-bottom:16px;}
.lf-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.lf-sub{font-size:12px;color:var(--muted);margin-bottom:22px;}
.lf-field{margin-bottom:14px;}
.lf-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;display:block;margin-bottom:7px;}
.lf-input{width:100%;background:var(--s2);border:1px solid var(--border2);
  color:var(--text);padding:13px 15px;font-size:15px;font-family:'Inter',sans-serif;
  border-radius:12px;outline:none;transition:border-color .2s;}
.lf-input:focus{border-color:var(--uber);}
.lf-input::placeholder{color:var(--muted);}
.lf-error{background:#E6394615;border:1px solid #E6394630;color:var(--danger);
  padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:14px;}
.lf-hint{background:var(--s2);border:1px solid var(--border);
  border-radius:12px;padding:14px;margin-top:16px;}
.lf-hint-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.lf-hint-row{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;}
.lf-hint-lbl{font-size:11px;color:var(--muted);}
.lf-hint-val{font-family:var(--mono);font-size:12px;color:var(--uber);
  background:#06C16712;padding:3px 10px;border-radius:6px;}
.lf-hint-more{font-size:10px;color:var(--muted);margin-top:8px;line-height:1.5;}

/* TOP NAV */
.tnav{display:flex;align-items:center;gap:12px;padding:14px 18px;
  background:var(--black);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;}
.tnav-av{width:36px;height:36px;border-radius:50%;background:var(--uber);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;color:#000;flex-shrink:0;}
.tnav-info{flex:1;}
.tnav-name{font-weight:700;font-size:14px;}
.tnav-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.tnav-right{display:flex;align-items:center;gap:6px;}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--uber);
  animation:pulse 2s infinite ease-in-out;}
.online-txt{font-size:11px;color:var(--uber);font-weight:600;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* BACK NAV */
.bnav{display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;background:var(--black);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;}
.bnav-back{color:var(--uber);font-size:14px;font-weight:600;cursor:pointer;}
.bnav-title{font-weight:700;font-size:14px;}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;background:var(--s1);
  border-top:1px solid var(--border);display:flex;z-index:100;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:10px 4px 13px;cursor:pointer;}
.bn-ico{font-size:19px;line-height:1;}
.bn-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;font-family:var(--mono);}
.bn.act .bn-ico,.bn.act .bn-lbl{color:var(--uber);}
.bn:not(.act) .bn-ico,.bn:not(.act) .bn-lbl{color:var(--muted);}
.pb{padding-bottom:72px;}

/* HERO CARD */
.hero{margin:14px;background:linear-gradient(145deg,#071510,#030a07);
  border:1px solid #06C16728;border-radius:22px;padding:22px 20px 18px;}
.hero-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;
  color:#06C16775;text-transform:uppercase;margin-bottom:8px;}
.hero-amt{font-size:44px;font-weight:900;color:var(--uber);
  letter-spacing:-2px;line-height:1;margin-bottom:3px;}
.hero-of{font-size:12px;color:var(--muted);margin-bottom:16px;}
.hero-of span{color:var(--text2);}
.prog-track{height:7px;background:#071510;border-radius:4px;
  overflow:hidden;margin-bottom:16px;border:1px solid #06C16715;}
.prog-fill{height:100%;border-radius:4px;}
.hero-grid{display:grid;grid-template-columns:1fr 1fr 1fr;
  border:1px solid #06C16718;border-radius:12px;overflow:hidden;margin-bottom:14px;}
.hg{padding:11px 6px;text-align:center;border-right:1px solid #06C16718;}
.hg:last-child{border-right:none;}
.hg-val{font-size:15px;font-weight:800;}
.hg-val.g{color:var(--uber);}
.hg-val.r{color:var(--danger);}
.hg-lbl{font-size:9px;color:var(--muted);margin-top:2px;
  text-transform:uppercase;letter-spacing:.5px;}
.goal-pill{display:inline-flex;align-items:center;padding:6px 14px;
  border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.gp-a{background:#06C16715;color:var(--uber);border:1px solid #06C16730;}
.gp-r{background:#E6394615;color:var(--danger);border:1px solid #E6394630;}
.gp-t{background:#F4A26115;color:var(--warn);border:1px solid #F4A26130;}

/* SECTION HEADER */
.sec{display:flex;align-items:center;gap:8px;padding:18px 18px 10px;}
.sec-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;}
.sec-ct{background:var(--s2);color:var(--muted);padding:2px 8px;
  border-radius:8px;font-family:var(--mono);font-size:10px;}

/* TRIP CARDS */
.trips{padding:0 14px;display:flex;flex-direction:column;gap:9px;}
.tc{background:var(--s1);border:1px solid var(--border);
  border-radius:16px;padding:14px;cursor:pointer;transition:all .18s;}
.tc:hover{border-color:#06C16740;background:#0a1510;}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;}
.tc-route{flex:1;}
.tc-from{font-weight:700;font-size:13px;}
.tc-to{font-size:12px;color:var(--text2);margin-top:2px;}
.tc-fare{font-size:20px;font-weight:800;color:var(--uber);margin-left:10px;}
.tc-bot{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.chip{font-size:10px;color:var(--muted);background:var(--s2);
  padding:3px 8px;border-radius:6px;}
.tc-q{font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;padding:3px 8px;border-radius:6px;}
.tc-alert{font-size:10px;color:var(--warn);font-weight:600;}

/* STRESS CARD */
.stress-card{margin:4px 14px 0;background:var(--s1);
  border:1px solid var(--border);border-radius:14px;padding:14px;}
.sc-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.sc-row{display:flex;align-items:center;gap:12px;margin-bottom:9px;}
.sc-val{font-size:32px;font-weight:900;letter-spacing:-1px;}
.sc-title{font-size:13px;font-weight:600;}
.sc-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.sc-bar{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;}
.sc-fill{height:100%;border-radius:4px;}
.sc-ticks{display:flex;justify-content:space-between;
  font-size:9px;color:var(--muted);margin-top:4px;}

/* FLAG CARDS */
.flags{padding:0 14px;display:flex;flex-direction:column;gap:8px;}
.fc{background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:13px;}
.fc-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:8px;}
.fc-ico{width:38px;height:38px;border-radius:11px;display:flex;
  align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.fc-body{flex:1;}
.fc-type{font-size:11px;font-weight:800;letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:3px;}
.fc-expl{font-size:12px;color:var(--text2);line-height:1.5;}
.fc-right{text-align:right;flex-shrink:0;}
.fc-sev{font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;padding:3px 8px;border-radius:5px;}
.sev-high{background:#E6394618;color:var(--danger);}
.sev-medium{background:#F4A26118;color:var(--warn);}
.sev-low{background:#33333340;color:var(--muted);}
.fc-tid{font-size:10px;color:var(--muted);margin-top:3px;}
.score-rows{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.sr{display:flex;align-items:center;gap:9px;}
.sr-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);width:55px;flex-shrink:0;}
.sr-bar{flex:1;height:4px;background:var(--s2);border-radius:2px;overflow:hidden;}
.sr-fill{height:100%;border-radius:2px;}
.sr-val{font-family:var(--mono);font-size:10px;color:var(--text2);
  width:28px;text-align:right;flex-shrink:0;}

/* PROFILE */
.prof{padding:16px;}
.prof-card{background:var(--s1);border:1px solid var(--border);
  border-radius:18px;padding:18px;margin-bottom:12px;}
.prof-top{display:flex;align-items:center;gap:14px;margin-bottom:18px;
  padding-bottom:18px;border-bottom:1px solid var(--border);}
.prof-av{width:52px;height:52px;border-radius:50%;background:var(--uber);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:20px;color:#000;}
.prof-name{font-size:18px;font-weight:800;margin-bottom:3px;}
.prof-id{font-family:var(--mono);font-size:11px;color:var(--muted);}
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.pg{background:var(--s2);border-radius:11px;padding:11px 13px;}
.pg-val{font-size:17px;font-weight:800;color:var(--uber);margin-bottom:2px;}
.pg-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.logout-btn{width:100%;background:transparent;color:var(--danger);
  border:1px solid #E6394628;font-weight:600;font-size:13px;padding:13px;
  border-radius:12px;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .15s;}
.logout-btn:hover{background:#E6394610;}

/* MISC */
.no-alerts{margin:16px 14px;background:#06C16710;border:1px solid #06C16720;
  border-radius:14px;padding:20px;text-align:center;
  color:var(--uber);font-size:13px;font-weight:600;}
.see-all{text-align:center;color:var(--uber);font-size:12px;
  font-weight:600;padding:12px;cursor:pointer;}
.spacer{height:80px;}
.td-hero{margin:14px;background:var(--s1);border:1px solid var(--border);
  border-radius:18px;padding:18px;}
.tdh-route{font-size:13px;color:var(--text2);margin-bottom:5px;}
.tdh-from{font-weight:800;color:var(--text);}
.tdh-fare{font-size:36px;font-weight:900;color:var(--uber);
  letter-spacing:-1.5px;margin-bottom:9px;}
.tdh-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px;}
.tdh-q{font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;padding:4px 11px;border-radius:9px;}

/* UX WOW FACTORS */
@keyframes slideUpFade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: slideUpFade 0.4s ease forwards; }

.gp-a, .gp-t { transition: all 0.2s ease; cursor: default; }
.gp-a:hover { box-shadow: 0 0 8px #06C16740; transform: scale(1.02); }
.gp-t:hover { box-shadow: 0 0 8px #F4A26140; transform: scale(1.02); }

.goal-wrapper {
  margin-top: 10px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  display: none;
  font-size: 11px;
  color: var(--text2);
  animation: slideUpFade 0.2s ease forwards;
}
.goal-wrapper.show {
  display: block;
}
.goal-pill-btn {
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}
.goal-pill-btn:hover {
  filter: brightness(1.2);
  transform: translateY(-1px);
}
.goal-stat-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
.goal-stat-row:last-child { margin-bottom: 0; }
.goal-stat-val { font-family: var(--mono); color: var(--text); font-weight: 600; }
</style>
</head>
<body>

  <div class="sp-logo">Driver<em>Pulse</em></div>
  <div class="sp-sub">Signal Intelligence</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

var driverData = null;

// ── HELPERS ──
function fmtR(v) { return '\u20b9' + Number(v).toLocaleString('en-IN'); }
function s2m(s) { return Math.floor(s/60)+'m '+(s%60)+'s'; }
function slug(s) { return s.replace(/_/g,' '); }
function sCol(s) { return s>0.65?'#E63946':s>0.35?'#F4A261':'#06C167'; }
function sTitle(s) { return s>0.65?'High Stress':s>0.35?'Some Tension':'Smooth Ride'; }
function sSub(s) { return s>0.65?'Tough trip — rest up':s>0.35?'Mild tension detected':'Clean, comfortable drive'; }
function pCol(p) { return p>=0.7?'#06C167':p>=0.4?'#F4A261':'#E63946'; }
function gLabel(s) {
  if(s==='achieved') return '\u2713 Goal Hit!';
  if(s==='ahead') return '\u2191 Ahead';
  if(s==='at_risk') return '\u26a0 At Risk';
  if(s==='on_track') return '\u2192 On Track';
  return '\u25cf Active';
}
function gClass(s) {
  if(s==='achieved'||s==='ahead') return 'gp-a';
  if(s==='at_risk') return 'gp-r';
  return 'gp-t';
}
function ftIcon(t) {
  if(t==='conflict_moment') return '\u26a1';
  if(t==='harsh_braking') return '\u26a0';
  if(t==='audio_spike') return '\uD83D\uDD0A';
  return '\u223c';
}
function ftColor(t) {
  if(t==='conflict_moment') return '#E63946';
  if(t==='harsh_braking') return '#F4A261';
  if(t==='audio_spike') return '#74b9ff';
  return '#666';
}
function qColor(q) {
  if(q==='excellent') return '#06C167';
  if(q==='good') return '#74b9ff';
  if(q==='fair') return '#F4A261';
  return '#E63946';
}
function dlClass(s) {
  if(s==='ahead'||s==='achieved') return 'gs-a';
  if(s==='at_risk') return 'gs-r';
  return 'gs-t';
}

// ── BOOT ──
window.onload = function() {
  setTimeout(function() {
    document.getElementById('splash').classList.add('gone');
    setTimeout(function() { showLogin(); }, 600);
  }, 1600);
};

// ── ROUTING ──
function setApp(html) { document.getElementById('app').innerHTML = html; }

// ── BOTTOM NAV ──
function mkBotNav() {
  var tabs = [
    {id:'home',  ico:'\uD83C\uDFE0', lbl:'Home'},
    {id:'trips', ico:'\uD83D\uDE95', lbl:'Trips'},
    {id:'alerts',ico:'\u26A0',       lbl:'Alerts'},
    {id:'me',    ico:'\uD83D\uDC64', lbl:'Me'}
  ];
  var h = '<div class="bot-nav">';
  for (var i=0;i<tabs.length;i++) {
    var t=tabs[i], ac=tabView===t.id?' act':'';
    h += '<div class="bn'+ac+'" onclick="goTab(\''+t.id+'\')">';
    h += '<div class="bn-ico">'+t.ico+'</div>';
    h += '<div class="bn-lbl">'+t.lbl+'</div></div>';
  }
  return h+'</div>';
}
function goTab(tab) { tabView=tab; tripIdx=-1; showTab(); }

// ── LOGIN ──
var loginError = '';

function showLogin() {
  appView = 'login';
  var h = '<div class="login">';
  h += '<div class="login-hero">';
  h += '<div class="lh-logo">Driver<em>Pulse</em></div>';
  h += '<div class="lh-tag">Your shift. Your signal. Your goals.</div>';
  h += '</div>';
  h += '<div class="login-body">';
  h += '<div class="login-form">';
  h += '<div class="lf-title">Sign In</div>';
  h += '<div class="lf-sub">Use your Driver ID and registered name</div>';
  h += '<div class="lf-field">';
  h += '<label class="lf-label">Driver ID</label>';
  h += '<input class="lf-input" id="inp-id" type="text" placeholder="e.g. DRV107" autocomplete="off" autocapitalize="characters">';
  h += '</div>';
  h += '<div class="lf-field">';
  h += '<label class="lf-label">Password</label>';
  h += '<input class="lf-input" id="inp-pw" type="password" placeholder="Your registered name">';
  h += '</div>';
  if (loginError) {
    h += '<div class="lf-error">\u26a0 '+loginError+'</div>';
  }
  h += '<button class="login-btn" onclick="doLogin()">Sign In \u2192</button>';
  h += '<div class="lf-hint">';
  h += '<div class="lf-hint-title">Demo Credentials</div>';
  h += '<div class="lf-hint-row"><span class="lf-hint-lbl">Driver ID</span><span class="lf-hint-val">DRV107</span></div>';
  h += '<div class="lf-hint-row"><span class="lf-hint-lbl">Password</span><span class="lf-hint-val">Priya Driver107</span></div>';
  h += '<div class="lf-hint-more">Any driver ID from DRV001\u2013DRV210 with matching name works</div>';
  h += '</div>';
  h += '</div>';
  h += '<div class="login-foot">Driver Pulse \u00b7 Uber Hackathon 2024</div>';
  h += '</div></div>';
  setApp(h);
  var el = document.getElementById('inp-id');
  if (el) el.focus();
  // Enter key support
  document.getElementById('app').addEventListener('keydown', function(e){
    if(e.key==='Enter') doLogin();
  });
}

function doLogin() {
  var idEl = document.getElementById('inp-id');
  var pwEl = document.getElementById('inp-pw');
  if (!idEl || !pwEl) return;
  var inputId = idEl.value.trim().toUpperCase();
  var inputPw = pwEl.value.trim();
  if (!inputId || !inputPw) {
    loginError = 'Please enter both Driver ID and password.';
    showLogin(); return;
  }
  var found = null;
  for (var i=0; i<ALL_DRIVERS.length; i++) {
    if (ALL_DRIVERS[i].id === inputId) { found = ALL_DRIVERS[i]; break; }
  }
  if (!found) {
    loginError = 'Driver ID "'+inputId+'" not found.';
    showLogin(); return;
  }
  if (found.name !== inputPw) {
    loginError = 'Incorrect password. Use your registered name.';
    showLogin(); return;
  }
  loginError = '';
  setApp('<div class="loading"><div class="ldots"><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div></div><div class="ltxt">Loading your shift...</div></div>');
  setTimeout(function(){
    driverData = found; appView = 'dashboard'; tabView = 'home'; showTab();
  }, 900);
}
function doLogout() {
  driverData=null; loginSel=null; loginQ=''; loginError='';
  appView='login'; showLogin();
}

// ── DASHBOARD ROUTING ──
function showTab() {
  if(tabView==='home')   { showHome(); return; }
  if(tabView==='trips')  { showTrips(); return; }
  if(tabView==='alerts') { showAlerts(); return; }
  if(tabView==='me')     { showProfile(); return; }
}

// ── TOP NAV ──
function mkTopNav(subtitle) {
  var d=driverData;
  var h='<div class="tnav">';
  h+='<div class="tnav-av">'+d.name.charAt(0)+'</div>';
  h+='<div class="tnav-info"><div class="tnav-name">'+d.name+'</div>';
  h+='<div class="tnav-sub">'+(subtitle||d.city+' \u00b7 \u2605 '+d.rating)+'</div></div>';
  h+='<div class="tnav-right"><div class="online-dot"></div><span class="online-txt">Online</span></div>';
  return h+'</div>';
}
function mkBackNav(title, backFn) {
  return '<div class="bnav"><div class="bnav-back" onclick="'+backFn+'">\u2190 Back</div><div class="bnav-title">'+title+'</div><div style="width:50px"></div></div>';
}

// ── HOME TAB ──
function showHome() {
  var d=driverData, g=d.goal||{};
  var earned=g.current_earnings||0, target=g.target_earnings||1;
  var pct=Math.min(earned/target,1), pi=Math.round(pct*100);
  var vel=g.computed_velocity||0, proj=g.projected_earnings||earned;
  var gs=g.forecast_status||g.status||'in_progress';
  var pc=pCol(pct);
  var trips=d.trips||[], flags=d.flags||[];
  
  // OH: Velocity Suppression for early shifts (< 1hr or < 2 trips)
  var isVolatile = (g.current_hours < 1.0) || (trips.length < 2);
  var velDisp = isVolatile ? '<span style="font-size:10px;color:var(--muted)">Stabilizing...</span>' : fmtR(Math.round(vel))+'/hr';
  var projDisp = isVolatile ? '<span style="font-size:10px;color:var(--muted)">Gathering Data</span>' : fmtR(Math.round(proj));
  
  // OH: Gap coverage indicator
  var hasSensor = trips[0] && trips[0].motion_events_count !== undefined;
  
  var h='<div class="pb fade-in">';
  h+=mkTopNav(d.city+' \u00b7 '+d.shift_preference+' shift');
  // Hero
  h+='<div class="hero">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">';
  h+='<div class="hero-lbl">Today\'s Earnings</div>';
  if(hasSensor) h+='<div class="gp-a" style="font-size:8px;padding:2px 6px;border-radius:4px; border:1px solid #06C16750;">\u26a1 PULSE SIGNAL ACTIVE</div>';
  else h+='<div class="gp-t" style="font-size:8px;padding:2px 6px;border-radius:4px; border:1px solid #F4A26150;">\u24d8 EARNINGS ONLY DETECTED</div>';
  h+='</div>';
  h+='<div class="hero-amt">'+fmtR(earned)+'</div>';
  h+='<div class="hero-of">of <span>'+fmtR(target)+'</span> goal</div>';
  h+='<div class="prog-track"><div class="prog-fill" style="width:'+pi+'%;background:'+pc+'"></div></div>';
  h+='<div class="hero-grid">';
  h+='<div class="hg"><div class="hg-val" style="display:flex;align-items:center;justify-content:center;height:20px">'+velDisp+'</div><div class="hg-lbl">Pace</div></div>';
  h+='<div class="hg"><div class="hg-val '+(!isVolatile && proj>=target?'g':'')+'" style="display:flex;align-items:center;justify-content:center;height:20px">'+projDisp+'</div><div class="hg-lbl">Projected</div></div>';
  h+='<div class="hg"><div class="hg-val">'+pi+'%</div><div class="hg-lbl">Done</div></div>';
  h+='</div>';
  
  // Interactive Goal Preview
  h+='<div class="goal-pill goal-pill-btn '+gClass(gs)+'" onclick="toggleGoalPreview(this)">' + gLabel(gs) + ' <span style="margin-left:4px; font-size:9px;">\u25bc</span></div>';
  h+='<div class="goal-wrapper">';
  h+='<div class="goal-stat-row"><span>Required Pace To Goal:</span> <span class="goal-stat-val">' + fmtR(Math.max(0, (target - earned) / Math.max(0.1, (g.target_hours - g.current_hours)))) + '/hr</span></div>';
  h+='<div class="goal-stat-row"><span>Remaining Hours:</span> <span class="goal-stat-val">' + Math.max(0, g.target_hours - g.current_hours).toFixed(1) + 'h</span></div>';
  h+='</div>';
  
  h+='</div>';
  // Recent trips
  h+='<div class="sec"><div class="sec-title">Recent Trips</div><span class="sec-ct">'+trips.length+'</span></div>';
  h+='<div class="trips">';
  var show=Math.min(trips.length,3);
  for(var i=0;i<show;i++){
    var t=trips[i], tfc=0;
    for(var j=0;j<flags.length;j++){if(flags[j].trip_id===t.trip_id)tfc++;}
    var qc=qColor(t.trip_quality_rating);
    h+='<div class="tc" onclick="openTrip('+i+')">';
    h+='<div class="tc-top"><div class="tc-route"><div class="tc-from">'+(t.pickup_location||'\u2014')+'</div>';
    h+='<div class="tc-to">\u2192 '+(t.dropoff_location||'\u2014')+'</div></div>';
    h+='<div class="tc-fare">'+fmtR(t.fare)+'</div></div>';
    h+='<div class="tc-bot"><span class="chip">'+t.duration_min+'m</span><span class="chip">'+t.distance_km+'km</span>';
    h+='<span class="tc-q" style="background:'+qc+'15;color:'+qc+'">'+t.trip_quality_rating+'</span>';
    if(tfc>0)h+='<span class="tc-alert">\u26a0 '+tfc+'</span>';
    h+='</div></div>';
  }
  if(trips.length>3)h+='<div class="see-all" onclick="goTab(\'trips\')">See all '+trips.length+' trips \u2192</div>';
  h+='</div>';
  // Top flags
  if(flags.length>0){
    h+='<div class="sec"><div class="sec-title">Shift Alerts</div><span class="sec-ct">'+flags.length+'</span></div>';
    h+='<div class="flags">';
    var sf=Math.min(flags.length,2);
    for(var i=0;i<sf;i++){
      var fl=flags[i],fc=ftColor(fl.flag_type),fi=ftIcon(fl.flag_type);
      h+='<div class="fc"><div class="fc-top">';
      h+='<div class="fc-ico" style="background:'+fc+'18">'+fi+'</div>';
      h+='<div class="fc-body"><div class="fc-type" style="color:'+fc+'">'+slug(fl.flag_type)+'</div>';
      h+='<div class="fc-expl">'+fl.explanation+'</div></div>';
      h+='<div class="fc-right"><span class="fc-sev sev-'+fl.severity+'">'+fl.severity+'</span>';
      h+='<div class="fc-tid">'+fl.trip_id+'</div></div>';
      h+='</div></div>';
    }
    if(flags.length>2)h+='<div class="see-all" onclick="goTab(\'alerts\')">See all '+flags.length+' alerts \u2192</div>';
    h+='</div>';
  } else {
    h+='<div class="no-alerts">\u2713 No safety alerts this shift</div>';
  }
  h+='<div class="spacer"></div>'+mkBotNav()+'</div>';
  setApp(h);
}

// ── TRIPS TAB ──
function showTrips() {
  if(tripIdx>=0){showTripDetail();return;}
  var d=driverData, trips=d.trips||[], flags=d.flags||[];
  var totalFare=0; for(var i=0;i<trips.length;i++) totalFare+=trips[i].fare;
  var h='<div class="pb">';
  h+=mkTopNav(trips.length+' trips \u00b7 '+fmtR(totalFare)+' earned');
  h+='<div class="trips" style="padding-top:14px">';
  for(var i=0;i<trips.length;i++){
    var t=trips[i],tfc=0;
    for(var j=0;j<flags.length;j++){if(flags[j].trip_id===t.trip_id)tfc++;}
    var qc=qColor(t.trip_quality_rating);
    h+='<div class="tc" onclick="openTrip('+i+')">';
    h+='<div class="tc-top"><div class="tc-route"><div class="tc-from">'+(t.pickup_location||'\u2014')+'</div>';
    h+='<div class="tc-to">\u2192 '+(t.dropoff_location||'\u2014')+'</div></div>';
    h+='<div class="tc-fare">'+fmtR(t.fare)+'</div></div>';
    h+='<div class="tc-bot"><span class="chip">'+t.duration_min+'m</span><span class="chip">'+t.distance_km+'km</span>';
    h+='<span class="chip">'+fmtR(Math.round(t.earnings_velocity))+'/hr</span>';
    if(t.surge_multiplier>1)h+='<span class="chip" style="color:#06C167">'+t.surge_multiplier+'\u00d7</span>';
    h+='<span class="tc-q" style="background:'+qc+'15;color:'+qc+'">'+t.trip_quality_rating+'</span>';
    if(tfc>0)h+='<span class="tc-alert">\u26a0 '+tfc+'</span>';
    h+='</div></div>';
  }
  h+='</div><div class="spacer"></div>'+mkBotNav()+'</div>';
  setApp(h);
}
function openTrip(idx) { tripIdx=idx; tabView='trips'; showTripDetail(); }

function showTripDetail() {
  var d=driverData, t=d.trips[tripIdx];
  var flags=(d.flags||[]).filter(function(f){return f.trip_id===t.trip_id;});
  var sc=sCol(t.stress_score), sp=Math.round(t.stress_score*100);
  var qc=qColor(t.trip_quality_rating);
  var h='<div class="pb">';
  h+=mkBackNav('Trip Detail','goBack()');
  h+='<div class="td-hero">';
  h+='<div class="tdh-route"><span class="tdh-from">'+(t.pickup_location||'\u2014')+'</span>';
  h+=' <span style="color:var(--muted)">\u2192</span> '+(t.dropoff_location||'\u2014')+'</div>';
  h+='<div class="tdh-fare">'+fmtR(t.fare)+'</div>';
  h+='<div class="tdh-chips"><span class="chip">'+t.duration_min+' min</span>';
  h+='<span class="chip">'+t.distance_km+' km</span>';
  h+='<span class="chip">'+fmtR(Math.round(t.earnings_velocity))+'/hr</span>';
  h+='<span class="chip">'+t.surge_multiplier+'\u00d7 surge</span></div>';
  h+='<span class="tdh-q" style="background:'+qc+'15;color:'+qc+'">'+t.trip_quality_rating.toUpperCase()+' TRIP</span>';
  h+='</div>';
  h+='<div class="stress-card">';
  h+='<div class="sc-lbl">Trip Stress Score</div>';
  h+='<div class="sc-row"><div class="sc-val" style="color:'+sc+'">'+t.stress_score.toFixed(2)+'</div>';
  h+='<div><div class="sc-title">'+sTitle(t.stress_score)+'</div>';
  h+='<div class="sc-sub">'+sSub(t.stress_score)+'</div></div></div>';
  h+='<div class="sc-bar"><div class="sc-fill" style="width:'+sp+'%;background:'+sc+'"></div></div>';
  h+='<div class="sc-ticks"><span>0.0</span><span>0.5</span><span>1.0</span></div>';
  h+='</div>';
  if(flags.length>0){
    h+='<div class="sec"><div class="sec-title">Alerts on Trip</div><span class="sec-ct">'+flags.length+'</span></div>';
    h+='<div class="flags">';
    for(var i=0;i<flags.length;i++){
      var fl=flags[i],fc=ftColor(fl.flag_type),fi=ftIcon(fl.flag_type);
      h+='<div class="fc"><div class="fc-top">';
      h+='<div class="fc-ico" style="background:'+fc+'18">'+fi+'</div>';
      h+='<div class="fc-body"><div class="fc-type" style="color:'+fc+'">'+slug(fl.flag_type)+'</div>';
      h+='<div class="fc-expl">'+fl.explanation+'</div></div>';
      h+='<div class="fc-right"><span class="fc-sev sev-'+fl.severity+'">'+fl.severity+'</span>';
      h+='<div class="fc-tid">T+'+s2m(fl.elapsed_seconds)+'</div></div></div>';
      h+='<div class="score-rows">';
      h+='<div class="sr"><span class="sr-lbl">Motion</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(fl.motion_score*100)+'%;background:#F4A261"></div></div><span class="sr-val">'+fl.motion_score.toFixed(2)+'</span></div>';
      h+='<div class="sr"><span class="sr-lbl">Audio</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(fl.audio_score*100)+'%;background:#74b9ff"></div></div><span class="sr-val">'+fl.audio_score.toFixed(2)+'</span></div>';
      h+='<div class="sr"><span class="sr-lbl">Combined</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(fl.combined_score*100)+'%;background:'+fc+'"></div></div><span class="sr-val" style="color:'+fc+';font-weight:700">'+fl.combined_score.toFixed(2)+'</span></div>';
      h+='</div></div>';
    }
    h+='</div>';
  } else {
    h+='<div class="no-alerts">\u2713 No alerts on this trip</div>';
  }
  h+='<div class="spacer"></div>'+mkBotNav()+'</div>';
  setApp(h);
}
function goBack() { tripIdx=-1; showTrips(); }

// ── ALERTS TAB ──
function showAlerts() {
  var d=driverData, flags=d.flags||[];
  var h='<div class="pb">';
  h+=mkTopNav(flags.length+' events detected');
  if(flags.length===0){
    h+='<div class="no-alerts" style="margin:20px 14px">\u2713 No safety alerts this shift.</div>';
  }else{
    h+='<div class="flags" style="padding-top:14px">';
    for(var i=0;i<flags.length;i++){
      var fl=flags[i],fc=ftColor(fl.flag_type),fi=ftIcon(fl.flag_type);
      h+='<div class="fc"><div class="fc-top">';
      h+='<div class="fc-ico" style="background:'+fc+'18">'+fi+'</div>';
      h+='<div class="fc-body"><div class="fc-type" style="color:'+fc+'">'+slug(fl.flag_type)+'</div>';
      h+='<div class="fc-expl">'+fl.explanation+'</div></div>';
      h+='<div class="fc-right"><span class="fc-sev sev-'+fl.severity+'">'+fl.severity+'</span>';
      h+='<div class="fc-tid">'+fl.trip_id+'</div></div></div>';
      h+='<div class="score-rows">';
      h+='<div class="sr"><span class="sr-lbl">Motion</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(fl.motion_score*100)+'%;background:#F4A261"></div></div><span class="sr-val">'+fl.motion_score.toFixed(2)+'</span></div>';
      h+='<div class="sr"><span class="sr-lbl">Audio</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(fl.audio_score*100)+'%;background:#74b9ff"></div></div><span class="sr-val">'+fl.audio_score.toFixed(2)+'</span></div>';
      h+='<div class="sr"><span class="sr-lbl">Combined</span><div class="sr-bar"><div class="sr-fill" style="width:'+Math.round(fl.combined_score*100)+'%;background:'+fc+'"></div></div><span class="sr-val" style="color:'+fc+';font-weight:700">'+fl.combined_score.toFixed(2)+'</span></div>';
      h+='</div></div>';
    }
    h+='</div>';
  }
  h+='<div class="spacer"></div>'+mkBotNav()+'</div>';
  setApp(h);
}

// ── PROFILE TAB ──
function showProfile() {
  var d=driverData;
  var h='<div class="pb">';
  h+=mkTopNav('My Profile');
  h+='<div class="prof">';
  h+='<div class="prof-card">';
  h+='<div class="prof-top"><div class="prof-av">'+d.name.charAt(0)+'</div>';
  h+='<div><div class="prof-name">'+d.name+'</div>';
  h+='<div class="prof-id">'+d.id+' \u00b7 '+d.city+'</div></div></div>';
  h+='<div class="prof-grid">';
  h+='<div class="pg"><div class="pg-val">\u2605 '+d.rating+'</div><div class="pg-lbl">Rating</div></div>';
  h+='<div class="pg"><div class="pg-val">'+d.experience_months+'mo</div><div class="pg-lbl">Experience</div></div>';
  h+='<div class="pg"><div class="pg-val">'+d.trips_count+'</div><div class="pg-lbl">Trips Today</div></div>';
  h+='<div class="pg"><div class="pg-val">'+d.shift_preference+'</div><div class="pg-lbl">Shift</div></div>';
  h+='<div class="pg"><div class="pg-val">'+fmtR(d.avg_earnings_per_hour)+'/hr</div><div class="pg-lbl">Avg Pace</div></div>';
  h+='<div class="pg"><div class="pg-val">'+d.flags_count+'</div><div class="pg-lbl">Alerts</div></div>';
  h+='</div></div>';
  h+='<button class="logout-btn" onclick="doLogout()">\u2190 Switch Driver</button>';
  h+='</div>';
  h+=mkBotNav()+'</div>';
  setApp(h);
}
</script>
