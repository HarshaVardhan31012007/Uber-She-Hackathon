<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Pulse — Hackathon Submission</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #020202;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 0%, #111 0%, #020202 100%);
    }
    .container {
      max-width: 600px;
      padding: 40px;
      text-align: center;
      background: rgba(12, 12, 12, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      background: #071d14;
      color: #06C167;
      padding: 6px 14px;
      border-radius: 20px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: 1px solid rgba(0, 255, 136, 0.15);
      font-weight: 700;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }
    h1 em {
      color: #06C167;
      font-style: normal;
    }
    p {
      color: #8E8E93;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 40px;
    }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px 24px;
      text-decoration: none;
      color: white;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: #06C167;
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 255, 136, 0.1);
    }
    .card-icon {
      font-size: 32px;
      margin-bottom: 16px;
    }
    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 13px;
      color: #8E8E93;
    }
    @media(max-width: 600px) {
      .card-grid { grid-template-columns: 1fr; }
      .container { padding: 32px 20px; border-radius: 0; border: none; background: transparent; }
      body { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Uber Hackathon 2024</div>
    <h1>Driver <em>Pulse</em></h1>
    <p>A signal intelligence system that helps drivers understand safety moments and track earnings velocity in real time.</p>
    
    <div class="card-grid">
      <a href="admin_dashboard.html" class="card">
        <div class="card-icon">🌍</div>
        <div class="card-title">Fleet Command</div>
        <div class="card-desc">View fleet analytics and top-driver performance metrics.</div>
      </a>
      <a href="driver_dashboard.html" class="card">
        <div class="card-icon">📱</div>
        <div class="card-title">Driver View</div>
        <div class="card-desc">Simulate a specific driver's trip log and goal progress.</div>
      </a>
    </div>
  </div>
</body>
</html>
